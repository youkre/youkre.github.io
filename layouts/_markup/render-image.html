{{- if .IsBlock -}}
  <figure>
    <img src="{{ .Destination | safeURL }}">
    {{- with .Text }}<figcaption>{{ . | safeHTML }}</figcaption>{{ end -}}
  </figure>
{{- else -}}
  <img src="{{ .Destination | safeURL }}"
    {{- with .PlainText }} alt="{{ . }}"{{ end -}}
    {{- with .Title }} title="{{ . }}"{{ end -}}
  >
{{- end -}}
